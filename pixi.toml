[workspace]
authors = ["Juliana Leonel <juocano@gmail+lapogeomar.com>"]
channels = ["conda-forge"]
name = "Proj_Pellets_Amarelamento"
platforms = ["linux-64", "win-64", "osx-arm64"]
version = "1.0.0"

[tasks]
notebook = "jupyter nbclassic --ip=127.0.0.1 --NotebookApp.iopub_data_rate_limit=1000000000"

[dependencies]
nbclassic = ">=1.3.3,<2"
matplotlib-base = ">=3.10.6,<4"
numpy = ">=2.3.3,<3"
opencv = ">=4.12.0,<5"
pandas = ">=2.3.2,<3"
pillow = ">=11.3.0,<12"
scikit-image = ">=0.25.2,<0.26"
scikit-learn = ">=1.7.2,<2"
scipy = ">=1.16.2,<2"
seaborn = ">=0.13.2,<0.14"
